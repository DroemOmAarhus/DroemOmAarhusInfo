<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Restricted Access</title>
  <style>
    #fade {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: black;
      opacity: 0;
      pointer-events: none;
      transition: opacity 3s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #fade.active {
      opacity: 1;
    }
    #fade-text {
      color: rgba(255, 255, 255, 0.18);
      font-size: 3rem;
      font-family: monospace;
      letter-spacing: 0.5rem;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
    }
    #fade.active #fade-text {
      opacity: 1;
    }
  </style>
</head>

<body style="background:black; color:#dbdbdbf8; font-family:monospace; text-align:center; padding-top:100px;">

  <div id="fade">
    <span id="fade-text">Ja</span>
  </div>

  <img src="image/image_logo.jpg" alt="Logo" style="width:100px; height:100px; margin-bottom:20px;">
  <h1>ADGANG NØDVENDIG</h1>
  <p>Indtast nøgle</p>

  <input type="text" id="password">
  <br><br>
  <button onclick="checkPassword()">ENTER</button>

  <p id="error" style="color:red;"></p>

  <script>
    function checkPassword() {
      const input = document.getElementById("password").value;

      if (input === "DRØMMERJEG?") {
        sessionStorage.setItem("authenticated", "true");
        const fade = document.getElementById("fade");
        const fadeText = document.getElementById("fade-text");
        fade.classList.add("active");
        setTimeout(function() {
          fadeText.style.opacity = "0";
        }, 2000);
        setTimeout(function() {
          window.location.href = "home.html";
        }, 3100);
      } else {
        document.getElementById("error").innerText = "FORKERT NØGLE";
      }
    }
  </script>

</body>
</html>

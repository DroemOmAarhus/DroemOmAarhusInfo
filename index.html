<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Restricted Access</title>
</head>

<body style="background:black; color:#dbdbdbf8; font-family:monospace; text-align:center; padding-top:100px;">

  <h1>ADGANG NØDVENDIG</h1>
  <p>Indtast nøgle</p>

  <input type="text" id="password">
  <br><br>
  <button onclick="checkPassword()">ENTER</button>

  <p id="error" style="color:red;"></p>

  <script>
    function checkPassword() {
      const input = document.getElementById("password").value;

      if (input === "DRØMMERJEG?") {
        window.location.href = "home.html";
      } else {
        document.getElementById("error").innerText = "FORKERT NØGLE";
      }
    }
  </script>

</body>
</html>

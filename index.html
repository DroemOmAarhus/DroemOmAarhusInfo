<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Restricted Access</title>
  <style>
    #fade {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: black;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease-in-out;
    }
    #fade.active {
      opacity: 1;
    }
  </style>
</head>

<body style="background:black; color:#dbdbdbf8; font-family:monospace; text-align:center; padding-top:100px;">

  <div id="fade"></div>

  <img src="image/image_logo.jpg" alt="Logo" style="width:100px; height:100px; margin-bottom:20px;">
  <h1>ADGANG NØDVENDIG</h1>
  <p>Indtast nøgle</p>

  <input type="text" id="password">
  <br><br>
  <button onclick="checkPassword()">ENTER</button>

  <p id="error" style="color:red;"></p>

  <script>
    function checkPassword() {
      const input = document.getElementById("password").value;

      if (input === "DRØMMERJEG?") {
        sessionStorage.setItem("authenticated", "true");
        document.getElementById("fade").classList.add("active");
        setTimeout(function() {
          window.location.href = "home.html";
        }, 500);
      } else {
        document.getElementById("error").innerText = "FORKERT NØGLE";
      }
    }
  </script>

</body>
</html>
